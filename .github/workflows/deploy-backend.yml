name: Deploy Backend API

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
  push:
    branches:
      - master
    paths:
      - 'api/**'
      - '.github/workflows/deploy-backend.yml'

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20.x'
  AZURE_RESOURCE_GROUP: rg-spacecity-${{ github.event.inputs.environment || 'dev' }}

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: ./api
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./api
        run: npm run prisma:generate

      - name: Build
        working-directory: ./api
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            api/dist/
            api/node_modules/
            api/package.json
            api/package-lock.json
            api/prisma/

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ./api

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get App Service name
        id: get-app-name
        run: |
          APP_NAME=$(az webapp list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?contains(name, 'spacecity-api')].name | [0]" -o tsv)
          echo "appName=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.get-app-name.outputs.appName }}
          package: ./api

      - name: Run database migrations
        run: |
          # Set database URL from Key Vault
          DATABASE_URL=$(az keyvault secret show \
            --vault-name $(az keyvault list -g ${{ env.AZURE_RESOURCE_GROUP }} --query "[0].name" -o tsv) \
            --name database-url \
            --query value -o tsv)
          
          cd api
          export DATABASE_URL="$DATABASE_URL"
          npm run prisma:migrate:prod

      - name: Deployment Summary
        run: |
          echo "## Backend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App Service**: ${{ steps.get-app-name.outputs.appName }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Health Check**: https://${{ steps.get-app-name.outputs.appName }}.azurewebsites.net/health" >> $GITHUB_STEP_SUMMARY
