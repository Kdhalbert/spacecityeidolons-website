name: Deploy Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
  push:
    branches:
      - main
    paths:
      - 'infrastructure/bicep/**'
      - '.github/workflows/infrastructure.yml'

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-spacecity-${{ github.event.inputs.environment || 'dev' }}
  AZURE_LOCATION: eastus

jobs:
  validate:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep templates
        run: |
          az bicep build --file infrastructure/bicep/main.bicep
          az deployment group validate \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infrastructure/bicep/main.bicep \
            --parameters environment=${{ github.event.inputs.environment || 'dev' }} \
            --parameters appName=spacecity \
            --parameters postgresAdminUsername=${{ secrets.POSTGRES_ADMIN_USERNAME }} \
            --parameters postgresAdminPassword=${{ secrets.POSTGRES_ADMIN_PASSWORD }} \
            --parameters jwtSecret=${{ secrets.JWT_SECRET }} \
            --parameters jwtRefreshSecret=${{ secrets.JWT_REFRESH_SECRET }} \
            --parameters githubRepo=${{ github.repository }}

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      postgresHostname: ${{ steps.deploy.outputs.postgresHostname }}
      appServiceName: ${{ steps.deploy.outputs.appServiceName }}
      staticWebAppName: ${{ steps.deploy.outputs.staticWebAppName }}
      keyVaultName: ${{ steps.deploy.outputs.keyVaultName }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }}

      - name: Deploy Infrastructure
        id: deploy
        run: |
          DEPLOYMENT_OUTPUT=$(az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infrastructure/bicep/main.bicep \
            --parameters environment=${{ github.event.inputs.environment || 'dev' }} \
            --parameters appName=spacecity \
            --parameters postgresAdminUsername=${{ secrets.POSTGRES_ADMIN_USERNAME }} \
            --parameters postgresAdminPassword=${{ secrets.POSTGRES_ADMIN_PASSWORD }} \
            --parameters jwtSecret=${{ secrets.JWT_SECRET }} \
            --parameters jwtRefreshSecret=${{ secrets.JWT_REFRESH_SECRET }} \
            --parameters githubRepo=${{ github.repository }} \
            --output json)
          
          echo "Deployment completed successfully"
          
          # Export outputs
          echo "postgresHostname=$(echo $DEPLOYMENT_OUTPUT | jq -r '.properties.outputs.postgresHostname.value')" >> $GITHUB_OUTPUT
          echo "appServiceName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.properties.outputs.appServiceName.value')" >> $GITHUB_OUTPUT
          echo "staticWebAppName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.properties.outputs.staticWebAppName.value')" >> $GITHUB_OUTPUT
          echo "keyVaultName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.properties.outputs.keyVaultName.value')" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "## Infrastructure Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.AZURE_RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PostgreSQL Server**: ${{ steps.deploy.outputs.postgresHostname }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App Service**: ${{ steps.deploy.outputs.appServiceName }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Static Web App**: ${{ steps.deploy.outputs.staticWebAppName }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Key Vault**: ${{ steps.deploy.outputs.keyVaultName }}" >> $GITHUB_STEP_SUMMARY

  post-deployment:
    name: Post-Deployment Configuration
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Grant App Service access to Key Vault
        run: |
          APP_SERVICE_PRINCIPAL_ID=$(az webapp identity show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ needs.deploy.outputs.appServiceName }} \
            --query principalId -o tsv)
          
          az role assignment create \
            --assignee $APP_SERVICE_PRINCIPAL_ID \
            --role "Key Vault Secrets User" \
            --scope /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.KeyVault/vaults/${{ needs.deploy.outputs.keyVaultName }}

      - name: Setup complete
        run: |
          echo "✅ Infrastructure deployment and configuration complete!"
          echo "Next steps:"
          echo "1. Run database migrations: npm run prisma:migrate:prod"
          echo "2. Deploy backend API: Trigger deploy-backend workflow"
          echo "3. Deploy frontend: Trigger deploy-frontend workflow"
