name: Deploy Frontend to VM

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy-frontend.yml'
      - '.env.production'

env:
  NODE_VERSION: '20.x'
  API_URL: https://spacecity-api-dev-xdtfmqqqnpcha.azurewebsites.net

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Create production environment file
        run: |
          echo "VITE_API_URL=${{ env.API_URL }}" > .env.production
          cat .env.production

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Create deployment package
        run: |
          cd dist
          tar -czf ../frontend-deploy.tar.gz .
          cd ..

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-deploy.tar.gz
          retention-days: 7

  deploy:
    name: Deploy to VM (spacecityeidolons.com)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Upload deployment package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          source: "frontend-deploy.tar.gz"
          target: "/tmp/"

      - name: Extract and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script_stop: true
          script: |
            echo "🗑️  Clearing old files..."
            rm -rf /var/www/html/*
            
            echo "📂 Extracting new build..."
            tar -xzf /tmp/frontend-deploy.tar.gz -C /var/www/html/
            
            echo "🔒 Setting permissions..."
            chmod -R 755 /var/www/html
            
            echo "ℹ️  Skipping web server reload (not needed for static file changes)"
            
            echo "🧹 Cleaning up..."
            rm -f /tmp/frontend-deploy.tar.gz
            
            echo "✅ Deployment complete!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            echo "📋 Deployment verification:"
            echo "Files deployed: $(find /var/www/html -type f | wc -l)"
            echo "Disk usage: $(du -sh /var/www/html)"
            if [ -f /var/www/html/index.html ]; then
              echo "✅ index.html present"
            else
              echo "❌ index.html missing!"
              exit 1
            fi

      - name: Deployment Summary
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to**: spacecityeidolons.com" >> $GITHUB_STEP_SUMMARY
          echo "**Backend API**: ${{ env.API_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 Post-Deployment Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Clear Cloudflare cache (Caching → Purge Everything)" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify site: https://spacecityeidolons.com" >> $GITHUB_STEP_SUMMARY
          echo "3. Test invite forms and navigation" >> $GITHUB_STEP_SUMMARY
