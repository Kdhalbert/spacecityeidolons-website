name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20.x'
  AZURE_RESOURCE_GROUP: rg-spacecity-${{ github.event.inputs.environment || 'dev' }}

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Static Web App name and deployment token
        id: get-swa
        run: |
          SWA_NAME=$(az staticwebapp list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?contains(name, 'spacecity-web')].name | [0]" -o tsv)
          
          DEPLOYMENT_TOKEN=$(az staticwebapp secrets list \
            --name $SWA_NAME \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.apiKey -o tsv)
          
          echo "swaName=$SWA_NAME" >> $GITHUB_OUTPUT
          echo "::add-mask::$DEPLOYMENT_TOKEN"
          echo "deploymentToken=$DEPLOYMENT_TOKEN" >> $GITHUB_OUTPUT

      - name: Get API URL
        id: get-api-url
        run: |
          API_URL=$(az webapp list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?contains(name, 'spacecity-api')].defaultHostName | [0]" -o tsv)
          echo "apiUrl=https://$API_URL" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: ${{ steps.get-api-url.outputs.apiUrl }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-swa.outputs.deploymentToken }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/'
          api_location: ''
          output_location: 'dist'

      - name: Deployment Summary
        run: |
          SWA_URL=$(az staticwebapp show \
            --name ${{ steps.get-swa.outputs.swaName }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query defaultHostname -o tsv)
          
          echo "## Frontend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Static Web App**: ${{ steps.get-swa.outputs.swaName }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://$SWA_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **API URL**: ${{ steps.get-api-url.outputs.apiUrl }}" >> $GITHUB_STEP_SUMMARY
